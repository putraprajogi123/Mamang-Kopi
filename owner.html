<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamang Kopi — Owner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13110f; --card:#241c16; --card2:#2e241c;
    --cream:#f4ece1; --muted:#b8a894; --line:#3a2e24;
    --accent:#e3672f; --accent2:#f0944e; --gold:#d8a85b;
    --ok:#6fae6f; --wait:#d8a85b; --blue:#5b9bd8;
    --shadow:0 10px 40px rgba(0,0,0,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px;min-height:100vh}
  .display{font-family:'Fraunces',serif}
  .screen{display:none;animation:fade .35s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin:6px 0 18px}
  .topbar h1{font-family:'Fraunces',serif;font-weight:900;font-size:22px}
  .topbar .tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px;font-weight:500}
  input,select{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:11px;
    padding:12px 13px;color:var(--cream);font-family:inherit;font-size:15px;outline:none}
  input:focus,select:focus{border-color:var(--accent)}

  .btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    border-radius:12px;padding:13px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
  .btn:active{transform:scale(.99)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);margin-top:10px}
  .btn.sm{width:auto;padding:9px 16px;margin:0;font-size:14px;border-radius:10px}
  .btn.ok{background:linear-gradient(135deg,#4f9a4f,#6fae6f)}
  .btn.blue{background:linear-gradient(135deg,#3f7fb8,#5b9bd8)}

  .stat-row{display:flex;gap:10px;margin-bottom:16px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .stat .n{font-family:'Fraunces',serif;font-weight:900;font-size:24px;line-height:1}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px}
  .stat.wait .n{color:var(--wait)} .stat.ok .n{color:var(--ok)} .stat.all .n{color:var(--accent2)}

  .selbar{display:flex;gap:10px;align-items:center;margin-bottom:14px}
  .selbar select{flex:1}

  .order{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
  .order .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .order .nm{font-weight:600;font-size:16px}
  .order .hp{font-size:13px;color:var(--muted)}
  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .badge.menunggu_konfirmasi{background:rgba(216,168,91,.15);color:var(--wait)}
  .badge.dibayar{background:rgba(91,155,216,.15);color:var(--blue)}
  .badge.siap{background:rgba(240,148,78,.15);color:var(--accent2)}
  .badge.selesai{background:rgba(111,174,111,.15);color:var(--ok)}
  .badge.batal{background:rgba(180,90,90,.18);color:#e08a8a}
  .order .items{margin:10px 0;font-size:14px;color:var(--cream)}
  .order .items .it{display:flex;justify-content:space-between;padding:2px 0}
  .order .meta{font-size:13px;color:var(--muted);border-top:1px solid var(--line);padding-top:9px;margin-top:9px}
  .order .meta .catatan{color:var(--gold);margin-top:3px}
  .order .total{font-family:'Fraunces',serif;font-weight:700;color:var(--accent2)}
  .order .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;color:var(--muted);padding:30px;font-size:14px}
  .err{background:rgba(227,103,47,.12);border:1px solid var(--accent);color:var(--accent2);border-radius:11px;padding:11px;font-size:14px;margin-top:12px;display:none}

  /* navigasi tab */
  .nav{display:flex;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:16px}
  .nav button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;padding:9px;border-radius:9px;cursor:pointer}
  .nav button.active{background:var(--accent);color:#fff}

  /* katalog */
  .cat-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px}
  .cat-item .nm{font-weight:600;font-size:15px}
  .cat-item .pr{font-size:13px;color:var(--gold)}
  .cat-item .arsip{font-size:11px;color:var(--muted)}

  /* setup */
  .row2{display:flex;gap:10px}
  .row2>div{flex:1}
  .pick{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}
  .pick .top{display:flex;align-items:center;gap:10px}
  .pick .top input[type=checkbox]{width:20px;height:20px;flex-shrink:0}
  .pick .top .nm{font-weight:600;flex:1}
  .pick .fields{display:none;gap:10px;margin-top:11px}
  .pick.on .fields{display:flex}
  .pick .fields>div{flex:1}
  .titik-row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;position:relative}
  .titik-row .del{position:absolute;top:10px;right:10px;background:none;border:none;color:#e08a8a;font-size:18px;cursor:pointer}
  .ok-msg{background:rgba(111,174,111,.12);border:1px solid var(--ok);color:var(--ok);border-radius:11px;padding:12px;font-size:14px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="wrap">

  <!-- KUNCI -->
  <div class="screen active" id="s-lock">
    <div class="topbar"><h1 class="display">Mamang Kopi</h1><span class="tag">Owner</span></div>
    <div class="card" style="margin-top:40px">
      <div style="font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin-bottom:4px">Masuk Owner</div>
      <p style="color:var(--muted);font-size:14px">Masukkan kata sandi untuk mengelola pesanan.</p>
      <label class="label">Kata sandi</label>
      <input id="in-pass" type="password" placeholder="••••••">
      <div class="err" id="err-lock">Kata sandi salah.</div>
      <button class="btn" id="btn-unlock">Masuk</button>
    </div>
  </div>

  <!-- PESANAN -->
  <div class="screen" id="s-orders">
    <div class="topbar">
      <h1 class="display">Pesanan</h1>
      <span class="tag" id="lbl-tgl"></span>
    </div>
    <div class="nav">
      <button class="active" onclick="goTab('orders',this)">Pesanan</button>
      <button onclick="goTab('setup',this)">Setup</button>
      <button onclick="goTab('katalog',this)">Katalog</button>
    </div>
    <div class="selbar">
      <select id="sel-sesi"></select>
      <button class="btn sm ghost" id="btn-reload" style="margin:0">↻</button>
    </div>

    <div class="stat-row">
      <div class="stat wait"><div class="n" id="st-wait">0</div><div class="l">Menunggu</div></div>
      <div class="stat ok"><div class="n" id="st-paid">0</div><div class="l">Dibayar+</div></div>
      <div class="stat all"><div class="n" id="st-all">0</div><div class="l">Total</div></div>
    </div>

    <div id="orders-loading" class="loading" style="display:none"><div class="spinner"></div>Memuat pesanan…</div>
    <div id="orders-list"></div>
  </div>

  <!-- KATALOG -->
  <div class="screen" id="s-katalog">
    <div class="topbar"><h1 class="display">Katalog</h1><span class="tag">Menu</span></div>
    <div class="nav">
      <button onclick="goTab('orders',this)">Pesanan</button>
      <button onclick="goTab('setup',this)">Setup</button>
      <button class="active" onclick="goTab('katalog',this)">Katalog</button>
    </div>
    <div id="katalog-list"></div>
    <div class="card" style="margin-top:8px">
      <div style="font-family:'Fraunces',serif;font-weight:600;font-size:17px">Tambah / Ubah Menu</div>
      <input type="hidden" id="cat-id">
      <label class="label">Nama menu</label>
      <input id="cat-nama" placeholder="mis. Kopi Susu Gula Aren">
      <div class="row2">
        <div><label class="label">Harga normal</label><input id="cat-harga" type="number" inputmode="numeric" placeholder="15000"></div>
        <div><label class="label">Status</label>
          <select id="cat-aktif"><option value="TRUE">Aktif</option><option value="FALSE">Arsip</option></select></div>
      </div>
      <div class="err" id="err-cat"></div>
      <div class="ok-msg" id="ok-cat">Tersimpan.</div>
      <button class="btn" id="btn-simpan-menu">Simpan Menu</button>
      <button class="btn ghost" id="btn-cat-reset">Kosongkan form</button>
    </div>
  </div>

  <!-- SETUP -->
  <div class="screen" id="s-setup">
    <div class="topbar"><h1 class="display">Setup Harian</h1><span class="tag">Sesi</span></div>
    <div class="nav">
      <button onclick="goTab('orders',this)">Pesanan</button>
      <button class="active" onclick="goTab('setup',this)">Setup</button>
      <button onclick="goTab('katalog',this)">Katalog</button>
    </div>
    <div class="card">
      <label class="label">Tanggal jualan</label>
      <input id="set-tanggal" type="date">
      <div class="row2">
        <div><label class="label">Buka langganan</label><input id="set-bl" type="time"></div>
        <div><label class="label">Buka umum</label><input id="set-bu" type="time"></div>
      </div>
      <div class="row2">
        <div><label class="label">Batas tutup</label><input id="set-bt" type="time"></div>
        <div><label class="label">Status</label>
          <select id="set-status"><option value="draft">Draft</option><option value="buka">Buka</option></select></div>
      </div>

      <label class="label" style="margin-top:18px">Menu yang dijual</label>
      <div id="set-menu-list"></div>

      <label class="label" style="margin-top:18px">Titik antar</label>
      <div id="set-titik-list"></div>
      <button class="btn ghost" id="btn-add-titik" style="margin-top:0">+ Tambah titik</button>

      <div class="err" id="err-setup"></div>
      <div class="ok-msg" id="ok-setup">Sesi berhasil dipublikasikan.</div>
      <button class="btn" id="btn-publish">Publikasikan</button>
    </div>
  </div>

</div>

<script>
  // ====== KONFIGURASI ======
  var API = "https://script.google.com/macros/s/AKfycbx4t3ddJrZEno3HYaKry3q_gFq_hGn4-tlOAFTxc7kp-DMcack-V2-ibP2KY9532S8PSA/exec";
  var PASSWORD = "mamang123"; // GANTI dengan kata sandi kamu

  // ====== STATE ======
  var st = { sesiList:[], sesiSel:null, menuMap:{}, titikMap:{} };

  function $(id){return document.getElementById(id)}
  function show(s){document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active')});$(s).classList.add('active');window.scrollTo(0,0)}
  function rupiah(n){return "Rp "+(Number(n)||0).toLocaleString('id-ID')}
  var STATUS_LABEL = { menunggu_konfirmasi:'Menunggu', dibayar:'Dibayar', siap:'Siap', selesai:'Selesai', batal:'Batal' };

  // ====== KUNCI ======
  (function(){ if(localStorage.getItem('mamang_owner')==='1'){ show('s-orders'); init(); } })();
  $('btn-unlock').onclick = function(){
    if($('in-pass').value === PASSWORD){
      localStorage.setItem('mamang_owner','1'); $('err-lock').style.display='none';
      show('s-orders'); init();
    } else { $('err-lock').style.display='block'; }
  };
  $('in-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') $('btn-unlock').click(); });

  // ====== INIT: muat katalog + daftar sesi ======
  function init(){
    // katalog (untuk nama menu)
    fetch(API+"?action=getKatalog").then(function(r){return r.json()}).then(function(d){
      if(d.ok) d.menu.forEach(function(m){ st.menuMap[m.id]=m.nama; });
      loadSesiList();
    }).catch(loadSesiList);
  }

  function loadSesiList(){
    fetch(API+"?action=getSesiList").then(function(r){return r.json()}).then(function(d){
      if(d.ok && d.sesi.length){
        st.sesiList = d.sesi;
        var opt='';
        d.sesi.forEach(function(s){ opt += '<option value="'+s.id+'">'+s.tanggal+' — '+s.status+'</option>'; });
        $('sel-sesi').innerHTML = opt;
        st.sesiSel = d.sesi[0].id;
        $('sel-sesi').value = st.sesiSel;
        loadOrders();
      } else {
        $('orders-list').innerHTML = '<div class="empty">Belum ada sesi.</div>';
      }
    });
  }

  $('sel-sesi').onchange = function(){ st.sesiSel = this.value; loadOrders(); };
  $('btn-reload').onclick = function(){ loadOrders(); };

  // ====== MUAT PESANAN ======
  function loadOrders(){
    if(!st.sesiSel) return;
    $('orders-loading').style.display='block'; $('orders-list').innerHTML='';
    var s = st.sesiList.filter(function(x){return x.id===st.sesiSel})[0];
    $('lbl-tgl').textContent = s ? s.tanggal : '';
    fetch(API+"?action=getPesananOwner&sesi_id="+encodeURIComponent(st.sesiSel))
      .then(function(r){return r.json()})
      .then(function(d){
        $('orders-loading').style.display='none';
        if(!d.ok){ $('orders-list').innerHTML='<div class="empty">Gagal memuat.</div>'; return; }
        renderOrders(d.pesanan);
      })
      .catch(function(){ $('orders-loading').style.display='none'; $('orders-list').innerHTML='<div class="empty">Gagal memuat. Periksa koneksi.</div>'; });
  }

  function renderOrders(list){
    var wait=0, paid=0;
    list.forEach(function(p){
      if(p.status==='menunggu_konfirmasi') wait++;
      if(p.status==='dibayar'||p.status==='siap'||p.status==='selesai') paid++;
    });
    $('st-wait').textContent=wait; $('st-paid').textContent=paid; $('st-all').textContent=list.length;

    if(!list.length){ $('orders-list').innerHTML='<div class="empty">Belum ada pesanan untuk sesi ini.</div>'; return; }

    // urutkan: menunggu dulu, lalu dibayar, siap, selesai, batal
    var order = {menunggu_konfirmasi:0,dibayar:1,siap:2,selesai:3,batal:4};
    list.sort(function(a,b){ return (order[a.status]||9)-(order[b.status]||9); });

    var html='';
    list.forEach(function(p){
      var items = p.items.map(function(it){
        return '<div class="it"><span>'+(st.menuMap[it.menu_id]||it.menu_id)+' × '+it.jumlah+'</span></div>';
      }).join('');
      var actions='';
      if(p.status==='menunggu_konfirmasi') actions='<button class="btn sm ok" onclick="aksi(\''+p.id+'\',\'konfirmasi\')">Konfirmasi Bayar</button>';
      else if(p.status==='dibayar') actions='<button class="btn sm blue" onclick="aksi(\''+p.id+'\',\'siap\')">Tandai Siap</button>';
      else if(p.status==='siap') actions='<button class="btn sm ok" onclick="aksi(\''+p.id+'\',\'selesai\')">Tandai Selesai</button>';

      html += '<div class="order" id="ord-'+p.id+'">'+
        '<div class="head"><div><div class="nm">'+p.nama+'</div><div class="hp">'+p.no_hp+'</div></div>'+
          '<span class="badge '+p.status+'">'+(STATUS_LABEL[p.status]||p.status)+'</span></div>'+
        '<div class="items">'+items+'</div>'+
        '<div class="meta">Kode: <b>'+p.kode_qr+'</b> · <span class="total">'+rupiah(p.total_bayar)+'</span>'+
          (p.catatan ? '<div class="catatan">📝 '+p.catatan+'</div>' : '')+
        '</div>'+
        (actions ? '<div class="actions">'+actions+'</div>' : '')+
        '</div>';
    });
    $('orders-list').innerHTML = html;
  }

  // ====== AKSI (POST) ======
  window.aksi = function(pesananId, jenis){
    var card = $('ord-'+pesananId);
    var btn = card ? card.querySelector('.actions .btn') : null;
    if(btn){ btn.disabled=true; btn.textContent='…'; }

    var payload;
    if(jenis==='konfirmasi') payload = { action:"konfirmasiBayar", pesanan_id:pesananId };
    else payload = { action:"ubahStatus", pesanan_id:pesananId, status:jenis };

    fetch(API, { method:"POST", body:JSON.stringify(payload) })
      .then(function(r){return r.json()})
      .then(function(d){
        if(d.ok){ loadOrders(); }
        else { alert('Gagal: '+(d.error||'tidak diketahui')); if(btn){btn.disabled=false;} }
      })
      .catch(function(){ alert('Gagal mengirim. Periksa koneksi.'); if(btn){btn.disabled=false;} });
  };
  // ====== NAVIGASI TAB ======
  window.goTab = function(tab, btn){
    if(tab==='orders'){ show('s-orders'); loadOrders(); }
    else if(tab==='setup'){ show('s-setup'); initSetup(); }
    else if(tab==='katalog'){ show('s-katalog'); loadKatalog(); }
  };

  // ====== KATALOG ======
  function loadKatalog(){
    fetch(API+"?action=getKatalog").then(function(r){return r.json()}).then(function(d){
      if(!d.ok){ $('katalog-list').innerHTML='<div class="empty">Gagal memuat.</div>'; return; }
      d.menu.forEach(function(m){ st.menuMap[m.id]=m.nama; });
      var html='';
      d.menu.forEach(function(m){
        var arsip = String(m.aktif).toLowerCase()!=='true';
        html += '<div class="cat-item"><div><div class="nm">'+m.nama+(arsip?' <span class="arsip">(arsip)</span>':'')+'</div>'+
          '<div class="pr">'+rupiah(m.harga)+'</div></div>'+
          '<button class="btn sm ghost" style="margin:0" onclick="editMenu(\''+m.id+'\',\''+encodeURIComponent(m.nama)+'\','+m.harga+',\''+m.aktif+'\')">Ubah</button></div>';
      });
      $('katalog-list').innerHTML = html || '<div class="empty">Belum ada menu.</div>';
    });
  }

  window.editMenu = function(id,nama,harga,aktif){
    $('cat-id').value=id; $('cat-nama').value=decodeURIComponent(nama);
    $('cat-harga').value=harga; $('cat-aktif').value=String(aktif).toLowerCase()==='true'?'TRUE':'FALSE';
    $('s-katalog').scrollIntoView({behavior:'smooth',block:'end'});
  };
  $('btn-cat-reset').onclick = function(){ $('cat-id').value=''; $('cat-nama').value=''; $('cat-harga').value=''; $('cat-aktif').value='TRUE'; };

  $('btn-simpan-menu').onclick = function(){
    $('err-cat').style.display='none'; $('ok-cat').style.display='none';
    var nama=$('cat-nama').value.trim(), harga=$('cat-harga').value;
    if(!nama){ $('err-cat').textContent='Nama menu wajib diisi.'; $('err-cat').style.display='block'; return; }
    var payload={ action:"simpanMenu", nama:nama, harga:Number(harga)||0, aktif:$('cat-aktif').value };
    if($('cat-id').value) payload.id=$('cat-id').value;
    var btn=this; btn.disabled=true; btn.textContent='Menyimpan…';
    fetch(API,{method:"POST",body:JSON.stringify(payload)}).then(function(r){return r.json()}).then(function(d){
      btn.disabled=false; btn.textContent='Simpan Menu';
      if(d.ok){ $('ok-cat').style.display='block'; $('btn-cat-reset').click(); loadKatalog(); }
      else { $('err-cat').textContent='Gagal: '+d.error; $('err-cat').style.display='block'; }
    }).catch(function(){ btn.disabled=false; btn.textContent='Simpan Menu'; $('err-cat').textContent='Gagal mengirim.'; $('err-cat').style.display='block'; });
  };

  // ====== SETUP ======
  var setupTitikInit=false;
  function initSetup(){
    // default tanggal = besok (set sekali kalau masih kosong)
    if(!$('set-tanggal').value){
      var bsk=new Date(); bsk.setDate(bsk.getDate()+1);
      $('set-tanggal').value = bsk.toISOString().slice(0,10);
    }
    // SELALU muat ulang menu aktif dari katalog (agar menu baru ikut muncul)
    $('set-menu-list').innerHTML = '<div class="loading"><div class="spinner"></div>Memuat menu…</div>';
    fetch(API+"?action=getKatalog").then(function(r){return r.json()}).then(function(d){
      if(d.ok){
        var aktif = d.menu.filter(function(m){ return String(m.aktif).toLowerCase()==='true'; });
        var html='';
        aktif.forEach(function(m){
          html += '<div class="pick" id="pick-'+m.id+'">'+
            '<div class="top"><input type="checkbox" onchange="togglePick(\''+m.id+'\')"><span class="nm">'+m.nama+'</span></div>'+
            '<div class="fields"><div><label class="label" style="margin-top:0">Harga hari ini</label>'+
              '<input type="number" inputmode="numeric" id="ph-'+m.id+'" value="'+m.harga+'"></div>'+
              '<div><label class="label" style="margin-top:0">Kuota</label>'+
              '<input type="number" inputmode="numeric" id="kt-'+m.id+'" placeholder="10"></div></div></div>';
        });
        $('set-menu-list').innerHTML = html || '<div class="empty">Belum ada menu aktif. Tambah di Katalog dulu.</div>';
      } else {
        $('set-menu-list').innerHTML = '<div class="empty">Gagal memuat menu. Coba buka tab ini lagi.</div>';
      }
    }).catch(function(){
      $('set-menu-list').innerHTML = '<div class="empty">Gagal memuat menu. Periksa koneksi.</div>';
    });
    // baris titik default hanya sekali
    if(!setupTitikInit){ addTitikRow(); setupTitikInit=true; }
  }

  window.togglePick = function(id){ $('pick-'+id).classList.toggle('on'); };

  var titikCount=0;
  function addTitikRow(){
    titikCount++;
    var div=document.createElement('div'); div.className='titik-row'; div.id='tr-'+titikCount;
    div.innerHTML = '<button class="del" onclick="delTitik('+titikCount+')">✕</button>'+
      '<label class="label" style="margin-top:0">Nama titik</label><input class="tt-nama" placeholder="Kantor Kebun">'+
      '<div class="row2"><div><label class="label">Patokan</label><input class="tt-patokan" placeholder="Depan pos satpam"></div>'+
      '<div><label class="label">Jam antar</label><input class="tt-jam" type="time"></div></div>';
    $('set-titik-list').appendChild(div);
  }
  window.delTitik = function(n){ var el=$('tr-'+n); if(el) el.remove(); };
  $('btn-add-titik').onclick = addTitikRow;

  $('btn-publish').onclick = function(){
    $('err-setup').style.display='none'; $('ok-setup').style.display='none';
    var tanggal=$('set-tanggal').value;
    if(!tanggal){ showSetupErr('Tanggal wajib diisi.'); return; }
    // konversi tanggal yyyy-mm-dd -> dd/mm/yyyy (samakan dengan format backend)
    var pr=tanggal.split('-'); var tglFmt=pr[2]+'/'+pr[1]+'/'+pr[0];

    // menu terpilih
    var menu=[];
    document.querySelectorAll('.pick.on').forEach(function(p){
      var id=p.id.replace('pick-','');
      menu.push({ menu_id:id, harga_hari_ini:Number($('ph-'+id).value)||0, kuota_menu:Number($('kt-'+id).value)||0 });
    });
    if(!menu.length){ showSetupErr('Pilih minimal satu menu.'); return; }

    // titik
    var titik=[], idx=0;
    document.querySelectorAll('.titik-row').forEach(function(tr){
      var nama=tr.querySelector('.tt-nama').value.trim();
      if(nama){ idx++; titik.push({ nama_titik:nama, patokan:tr.querySelector('.tt-patokan').value.trim(),
        waktu_antar:tr.querySelector('.tt-jam').value||'', urutan:idx }); }
    });
    if(!titik.length){ showSetupErr('Tambah minimal satu titik antar.'); return; }

    var kuotaTotal=0; menu.forEach(function(m){ kuotaTotal+=m.kuota_menu; });
    var payload={ action:"setupSesi", tanggal:tglFmt, kuota_total:kuotaTotal,
      buka_langganan:$('set-bl').value||'', buka_umum:$('set-bu').value||'', batas_tutup:$('set-bt').value||'',
      status:$('set-status').value, menu:menu, titik:titik };

    var btn=this; btn.disabled=true; btn.textContent='Mempublikasikan…';
    fetch(API,{method:"POST",body:JSON.stringify(payload)}).then(function(r){return r.json()}).then(function(d){
      btn.disabled=false; btn.textContent='Publikasikan';
      if(d.ok){ $('ok-setup').style.display='block'; }
      else if(d.error==='sesi sudah punya pesanan, tidak bisa diubah'){ showSetupErr('Sesi tanggal ini sudah ada pesanan — tidak bisa diubah. Ubah manual di Sheets bila perlu.'); }
      else { showSetupErr('Gagal: '+d.error); }
    }).catch(function(){ btn.disabled=false; btn.textContent='Publikasikan'; showSetupErr('Gagal mengirim. Periksa koneksi.'); });
  };
  function showSetupErr(m){ $('err-setup').textContent=m; $('err-setup').style.display='block'; }

</script>
</body>
</html>
